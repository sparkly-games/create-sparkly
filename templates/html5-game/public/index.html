<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Started | Sparkly</title>
    <style>
        :root {
            --primary: #444ead;
            --accent: #f1c40f;
            --bg: #0f0c29;
            --text: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3rem;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 90%;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #ccc;
            line-height: 1.6;
        }

        .steps {
            text-align: left;
            margin: 2rem 0;
            background: rgba(0, 0, 0, 0.2);
            padding: 1.5rem;
            border-radius: 12px;
        }

        .step {
            display: flex;
            align-items: center;
            margin-bottom: 1rem;
        }

        .step-num {
            background: var(--accent);
            color: #000;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 1rem;
            flex-shrink: 0;
        }

        code {
            background: #1e1e1e;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            color: #f1c40f;
            font-family: 'Fira Code', monospace;
        }

        .btn {
            display: inline-block;
            background: var(--accent);
            color: #000;
            padding: 1rem 2rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 1rem;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(241, 196, 15, 0.3);
        }

        footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>✨ Sparkly Scaffolding</h1>
        <p>Your project has been successfully generated. You're ready to start building something amazing.</p>

        <div class="steps">
            <div class="step">
                <div class="step-num">1</div>
                <div>Edit <code>spark.config.toml</code> to set your details.</div>
            </div>
            <div class="step">
                <div class="step-num">2</div>
                <div>Drop assets into the <code>/public</code> folder.</div>
            </div>
            <div class="step">
                <div class="step-num">3</div>
                <div>Run <code>npm start</code> to view your Spark live.</div>
            </div>
        </div>
        <footer>
            Generated by create-sparkly &bull; 2026
        </footer>
    </div>

</body>
</html>
